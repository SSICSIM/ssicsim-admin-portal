name: Build and Publish

# Push to main → build the backend image and push to GHCR.
# The frontend is deployed by Vercel automatically on push (no image needed).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/ssicsim/ssicsim-backend

jobs:
  build:
    name: Build & push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
