services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssicsim}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    container_name: db

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: redis

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/ssicsim}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
      WAIT_FOR_DB_TIMEOUT_S: ${WAIT_FOR_DB_TIMEOUT_S:-60}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python scripts/wait_for_postgres.py
      && alembic -c alembic.ini upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    container_name: backend


  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/ssicsim}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.worker"
    container_name: worker  
  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: >
      sh -c "npm run dev -- --hostname 0.0.0.0 --port 3000"
    container_name: frontend

volumes:
  pg_data:
  frontend_node_modules:
  frontend_next_cache:
