services:
  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    container_name: db

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: redis

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python scripts/wait_for_postgres.py
      && alembic -c alembic.ini upgrade heads
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    container_name: backend


  worker:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.worker"
    container_name: worker
  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: >
      sh -c "npm run dev -- --hostname 0.0.0.0 --port 3000"
    container_name: frontend

volumes:
  pg_data:
  frontend_node_modules:
  frontend_next_cache:
